<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .mode {
            margin-bottom: 30px;
        }

        select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
            background: #111;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns:repeat(3, 260px);
            gap: 40px;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: 0.3s;

            width: 260px;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .city {
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .digital {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .date {
            font-size: 13px;
            color: #cbd5f5;
            margin-bottom: 15px;
        }

        .clock {
            width: 120px;
            height: 120px;
            border: 6px solid #38bdf8;
            border-radius: 50%;
            position: relative;
            margin: auto;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%);
        }

        .hour {
            width: 6px;
            height: 32px;
            background: white;
        }

        .minute {
            width: 4px;
            height: 42px;
            background: #94a3b8;
        }

        .second {
            width: 2px;
            height: 45px;
            background: #f43f5e;
        }

        .center {
            width: 10px;
            height: 10px;
            background: #38bdf8;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .hide {
            display: none;
        }

        .number {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .n12 {
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
        }

        .n3 {
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
        }

        .n6 {
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
        }

        .n9 {
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
        }

        .n1 {
            top: 15px;
            right: 25px;
        }

        .n2 {
            top: 35px;
            right: 8px;
        }

        .n4 {
            bottom: 35px;
            right: 8px;
        }

        .n5 {
            bottom: 15px;
            right: 25px;
        }

        .n7 {
            bottom: 15px;
            left: 25px;
        }

        .n8 {
            bottom: 35px;
            left: 8px;
        }

        .n10 {
            top: 35px;
            left: 8px;
        }

        .n11 {
            top: 15px;
            left: 25px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🌏 World Clock</h1>

    <div class="mode">
        Display Mode :
        <select id="modeSelect">
            <option value="both">Both</option>
            <option value="analog">Analog</option>
            <option value="digital">Digital</option>
        </select>
    </div>

    <div class="grid">

        <div class="card" data-timezone="Asia/Ho_Chi_Minh">
            <div class="city">VN Hanoi, Vietnam</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

        <div class="card" data-timezone="Asia/Rangoon">
            <div class="city">MM Yangon, Myanmar</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

        <div class="card" data-timezone="Asia/Seoul">
            <div class="city">KR Seoul, Korea</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

        <div class="card" data-timezone="Asia/Tokyo">
            <div class="city">JP Tokyo, Japan</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

        <div class="card" data-timezone="Asia/Singapore">
            <div class="city">SG Singapore</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

        <div class="card" data-timezone="Asia/Kuala_Lumpur">
            <div class="city">MY Kuala Lumpur, Malaysia</div>
            <div class="digital"></div>
            <div class="date"></div>
            <div class="clock">
                <span class="number n1">1</span>
                <span class="number n2">2</span>
                <span class="number n3">3</span>
                <span class="number n4">4</span>
                <span class="number n5">5</span>
                <span class="number n6">6</span>
                <span class="number n7">7</span>
                <span class="number n8">8</span>
                <span class="number n9">9</span>
                <span class="number n10">10</span>
                <span class="number n11">11</span>
                <span class="number n12">12</span>

                <div class="hand hour"></div>
                <div class="hand minute"></div>
                <div class="hand second"></div>
                <div class="center"></div>
            </div>
        </div>

    </div>
</div>

<script>

    function updateClocks() {

        document.querySelectorAll(".card").forEach(card => {

            let tz = card.dataset.timezone;

            let now = new Date(
                new Date().toLocaleString("en-US", {timeZone: tz})
            );

            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            card.querySelector(".digital").textContent =
                String(h).padStart(2, '0') + ":" +
                String(m).padStart(2, '0') + ":" +
                String(s).padStart(2, '0');

            card.querySelector(".date").textContent =
                now.toDateString();

            let hourDeg = (h % 12) * 30 + m * 0.5;
            let minuteDeg = m * 6;
            let secondDeg = s * 6;

            card.querySelector(".hour").style.transform =
                `translateX(-50%) rotate(${hourDeg}deg)`;

            card.querySelector(".minute").style.transform =
                `translateX(-50%) rotate(${minuteDeg}deg)`;

            card.querySelector(".second").style.transform =
                `translateX(-50%) rotate(${secondDeg}deg)`;

        });

    }

    setInterval(updateClocks, 1000);
    updateClocks();

    document.getElementById("modeSelect").addEventListener("change", function () {

        let mode = this.value;

        document.querySelectorAll(".digital").forEach(d => {
            d.classList.toggle("hide", mode === "analog");
        });

        document.querySelectorAll(".date").forEach(d => {
            d.classList.toggle("hide", mode === "analog");
        });

        document.querySelectorAll(".clock").forEach(c => {
            c.classList.toggle("hide", mode === "digital");
        });

    });

</script>

</body>
</html>
