<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List & Meeting Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #1e2937;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            color: white;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .main-content { padding: 30px; }

        /* Add Task */
        .add-task {
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .add-task input {
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            flex: 1;
            min-width: 220px;
        }

        .add-task input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-add:hover { background: #4f46e5; }

        h2 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #1e2937;
        }

        /* Task Item */
        .task-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .task-item:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.1);
        }

        .task-info {
            font-size: 17px;
            font-weight: 500;
        }

        .task-info.done {
            text-decoration: line-through !important;
            color: #64748b;
            opacity: 0.85;
        }

        .task-date {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }

        .task-actions button {
            padding: 9px 18px;
            margin-left: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .done-btn {
            background: var(--success);
            color: white;
        }

        .create-btn {
            background: #64748b;
            color: white;
        }

        /* Calendar */
        .calendar-item {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .completed { background: #f0fdf4; border-left: 5px solid var(--success); }
        .meeting { background: #f0f9ff; border-left: 5px solid #3b82f6; }

        /* Modal Create Meeting - Theo kiểu bạn yêu cầu */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 420px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .attendee-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .attendee-btn {
            padding: 10px 16px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .attendee-btn.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .save-btn {
            background: var(--success);
            color: white;
        }

        .cancel-btn {
            background: #f1f5f9;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <i class="fas fa-calendar-check fa-2x"></i>
        <h1>To-Do List & Meeting Planner</h1>
    </header>

    <div class="main-content">
        <!-- Add Task -->
        <div class="add-task">
            <input type="text" id="taskTitle" placeholder="Task Title">
            <input type="date" id="taskDate">
            <button class="btn-add" onclick="addTask()">
                <i class="fas fa-plus"></i> Add Task
            </button>
        </div>

        <!-- Tasks -->
        <h2><i class="fas fa-list-check"></i> Tasks</h2>
        <div id="tasksList"></div>

        <!-- Calendar -->
        <h2 style="margin-top: 40px;"><i class="fas fa-calendar-alt"></i> Calendar</h2>
        <div id="calendarList"></div>
    </div>
</div>

<!-- Create Meeting Modal -->
<div class="modal" id="meetingModal">
    <div class="modal-content">
        <div class="modal-header">
            Create Meeting
            <span onclick="closeModal()" style="cursor:pointer; font-size:28px; color:#64748b;">×</span>
        </div>

        <input type="text" id="meetingTitle" placeholder="Meeting Title" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #cbd5e1; border-radius:8px;">

        <input type="date" id="meetingDate" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #cbd5e1; border-radius:8px;">

        <input type="time" id="meetingTime" value="09:00" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #cbd5e1; border-radius:8px;">

        <div style="margin-bottom: 8px; font-weight:500;">Attendees</div>
        <div class="attendee-options" id="attendeeOptions">
            <div class="attendee-btn active" data-email="yourmail@gmail.com">yourmail@gmail.com</div>
            <div class="attendee-btn" data-email="team@company.com">team@company.com</div>
        </div>

        <div class="modal-buttons">
            <button class="save-btn" onclick="saveMeeting()">Save Meeting</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let tasks = [];
    let meetings = [];
    let selectedAttendees = ["yourmail@gmail.com"];

    function addTask() {
        const title = document.getElementById('taskTitle').value.trim();
        const date = document.getElementById('taskDate').value;

        if (!title || !date) {
            alert("Please enter task title and due date!");
            return;
        }

        tasks.push({ id: Date.now(), title, dueDate: date, done: false });
        renderTasks();
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDate').value = '';
    }

    function renderTasks() {
        const container = document.getElementById('tasksList');
        container.innerHTML = '';

        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
          <div class="task-info ${task.done ? 'done' : ''}">
            ${task.title}
            <div class="task-date">Due: ${task.dueDate}</div>
          </div>
          <div class="task-actions">
            ${!task.done ? `<button class="done-btn" onclick="markDone(${task.id})">✓ Done</button>` : ''}
            <button class="create-btn" onclick="openMeetingModal(${task.id})">
              <i class="fas fa-video"></i> Create Meeting
            </button>
          </div>
        `;
            container.appendChild(div);
        });
    }

    function markDone(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.done = true;
            renderTasks();
            renderCalendar();
        }
    }

    function openMeetingModal(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            document.getElementById('meetingTitle').value = task.title;
            document.getElementById('meetingDate').value = task.dueDate;
        }
        document.getElementById('meetingModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('meetingModal').style.display = 'none';
    }

    // Attendee selection
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('attendee-btn')) {
            e.target.classList.toggle('active');

            const email = e.target.getAttribute('data-email');
            if (e.target.classList.contains('active')) {
                if (!selectedAttendees.includes(email)) selectedAttendees.push(email);
            } else {
                selectedAttendees = selectedAttendees.filter(e => e !== email);
            }
        }
    });

    function saveMeeting() {
        const title = document.getElementById('meetingTitle').value || "Untitled Meeting";
        const date = document.getElementById('meetingDate').value;
        const time = document.getElementById('meetingTime').value;

        if (!date) {
            alert("Please select a date for the meeting!");
            return;
        }

        meetings.push({
            title: title,
            date: date,
            time: time,
            attendees: selectedAttendees.join(", ")
        });

        closeModal();
        renderCalendar();
        alert("✅ Meeting created successfully!");
    }

    function renderCalendar() {
        const container = document.getElementById('calendarList');
        container.innerHTML = '';

        tasks.filter(t => t.done).forEach(task => {
            const div = document.createElement('div');
            div.className = 'calendar-item completed';
            div.innerHTML = `✅ <strong>Completed Task:</strong> ${task.title} (Due: ${task.dueDate})`;
            container.appendChild(div);
        });

        meetings.forEach(m => {
            const div = document.createElement('div');
            div.className = 'calendar-item meeting';
            div.innerHTML = `📍 <strong>Meeting:</strong> ${m.title}<br>
                         📅 ${m.date} at ${m.time}<br>
                         👥 ${m.attendees}`;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
